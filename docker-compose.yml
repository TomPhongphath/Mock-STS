networks:
  sts-frontend:
    driver: bridge
  sts-backend:
    driver: bridge

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt
  keycloak_password:
    file: ./secrets/keycloak_password.txt

services:
  # ==========================================
  # 0. Init Headscale config
  # ==========================================
  headscale-init:
    image: alpine:latest
    container_name: headscale_init
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/config/config.headscale.yaml:/tmp/config.headscale.yaml:ro
      - ./secrets/postgres_password.txt:/tmp/postgres_password.txt:ro
    command: >
      sh -c "
      if [ ! -f /etc/headscale/config.yaml ]; then
        echo 'Init Headscale config...';
        cp /tmp/config.headscale.yaml /etc/headscale/config.yaml;
        PGPASS=$$(cat /tmp/postgres_password.txt);
        sed -i s/__PASSWORD_PLACEHOLDER__/$$PGPASS/g /etc/headscale/config.yaml;
        echo 'Password injected successfully.';
      else
        echo 'Config already exists.';
      fi
      "
    networks:
      - sts-backend

  # ==========================================
  # 1. Headscale Server (backend only via Nginx)
  # ==========================================
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: always
    expose:
      - "8080"
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
    command: serve
    depends_on:
      headscale-init:
        condition: service_completed_successfully
      postgres_uat:
        condition: service_healthy
    networks:
      - sts-frontend
      - sts-backend

  # ==========================================
  # 2. PostgreSQL UAT
  # ==========================================
  postgres_uat:
    image: postgres:15-alpine
    container_name: postgres_uat
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_DB: STS
      POSTGRES_USER: userSTS
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userSTS -d STS"]
      interval: 5s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password
    networks:
      - sts-backend

  # ==========================================
  # 3. PostgreSQL MASTER
  # ==========================================
  postgres_master:
    image: postgres:15-alpine
    container_name: postgres_master
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_DB: STS
      POSTGRES_USER: userSTS
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userSTS -d STS"]
      interval: 5s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password
    networks:
      - sts-backend

  # ==========================================
  # 4. pgAdmin (via Nginx only)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_web
    restart: always
    expose:
      - "80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@yourdomain.com
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpass:ro
    secrets:
      - pgadmin_password
    depends_on:
      - postgres_uat
      - postgres_master
    networks:
      - sts-frontend
      - sts-backend

  # ==========================================
  # 5. Keycloak (via Nginx only)
  # ==========================================
  keycloak_auth:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak_auth
    restart: always
    expose:
      - "8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_master:5432/STS
      KC_DB_USERNAME: userSTS
      KC_DB_PASSWORD: 058c55af16a8410eb1eb5e94f79d073be235
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: e19effbe4cac4e1aaf901af179a68a0312a7c3a1
    command: start
    secrets:
      - postgres_password
      - keycloak_password
    depends_on:
      postgres_master:
        condition: service_healthy
    networks:
      - sts-frontend
      - sts-backend

  # ==========================================
  # 6. Nginx — TLS Gateway, Reverse Proxy
  # ==========================================
  nginx_gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
    depends_on:
      - headscale
      - keycloak_auth
      - pgadmin
    networks:
      - sts-frontend

  # ==========================================
  # 7. Certbot — Let's Encrypt Auto-renew
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "
      trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done
      "
    networks:
      - sts-frontend

volumes:
  postgres_uat_data:
  postgres_master_data:
  pgadmin_data:
