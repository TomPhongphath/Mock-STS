networks:
  sts-backend:
    driver: bridge

secrets:
  postgres_password:
    file: secrets/postgres_password.txt
  pgadmin_password:
    file: secrets/pgadmin_password.txt

services:
  # ==========================================
  # Init Headscale config
  # ==========================================
  headscale-init:
    image: alpine:latest
    container_name: headscale_init
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/config/config.headscale.yaml:/tmp/config.headscale.yaml:ro
    secrets:
      - postgres_password
    command: >
      sh -c "
      if [ ! -f /etc/headscale/config.yaml ]; then
        echo 'Init Headscale config...';
        cp /tmp/config.headscale.yaml /etc/headscale/config.yaml;
        PGPASS=$$(cat /run/secrets/postgres_password);
        sed -i s/__PASSWORD_PLACEHOLDER__/$$PGPASS/g /etc/headscale/config.yaml;
        echo 'Password injected successfully.';
      else
        echo 'Config already exists.';
      fi
      "
    networks:
      - sts-backend

  # ==========================================
  # Headscale Server — Mesh VPN Control Plane
  # ==========================================
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: always
    ports:
      - "0.0.0.0:${HS_PORT:-8080}:8080"
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
    command: serve
    depends_on:
      headscale-init:
        condition: service_completed_successfully
      postgres_uat:
        condition: service_healthy
    networks:
      - sts-backend

  # ==========================================
  # PostgreSQL UAT
  # ==========================================
  postgres_uat:
    image: postgres:15-alpine
    container_name: postgres_uat
    restart: always
    ports:
      - "127.0.0.1:${PG_UAT_PORT:-5431}:5432"
    environment:
      POSTGRES_DB: STS
      POSTGRES_USER: userSTS
      POSTGRES_PASSWORD: 058c55af16a8410eb1eb5e94f79d073be235
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userSTS -d STS"]
      interval: 5s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password
    networks:
      - sts-backend

  # ==========================================
  # PostgreSQL MASTER
  # ==========================================
  postgres_master:
    image: postgres:15-alpine
    container_name: postgres_master
    restart: always
    ports:
      - "127.0.0.1:${PG_MASTER_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: STS
      POSTGRES_USER: userSTS
      POSTGRES_PASSWORD: 058c55af16a8410eb1eb5e94f79d073be235
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userSTS -d STS"]
      interval: 5s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password
    networks:
      - sts-backend

  # ==========================================
  # pgAdmin — Web UI สำหรับจัดการ DB
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_web
    restart: always
    ports:
      - "${PGADMIN_BIND_IP:-0.0.0.0}:${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@yourdomain.com
      PGADMIN_DEFAULT_PASSWORD: dabdbf94edee40f287a569de
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpass:ro
    secrets:
      - pgadmin_password
    depends_on:
      - postgres_uat
      - postgres_master
    networks:
      - sts-backend

  # ==========================================
  # Jenkins — CI/CD Server
  # ==========================================
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: always
    ports:
      - "0.0.0.0:${JENKINS_PORT:-9090}:8080"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_OPTS: "--prefix="
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PG_UAT_HOST: postgres_uat
      PG_UAT_PORT: 5432
      PG_UAT_NAME: STS
      PG_UAT_USER: userSTS
      PG_UAT_PASS: ${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      PG_MASTER_HOST: postgres_master
      PG_MASTER_PORT: 5432
      PG_MASTER_NAME: STS
      PG_MASTER_USER: userSTS
      PG_MASTER_PASS: ${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./jenkins/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d:ro
      - ./jenkins/jobs:/opt/jenkins-job-templates:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:/workspace
    user: root
    entrypoint: >
      sh -c "
      apt-get update -qq;
      apt-get install -y -qq docker.io docker-compose;
      exec /usr/bin/tini -- /usr/local/bin/jenkins.sh
      "
    depends_on:
      - postgres_uat
      - postgres_master
    networks:
      - sts-backend

  # ==========================================
  # Nginx Gateway — Reverse Proxy (port 80)
  # จัดการ route traffic ไปยัง service containers
  # ที่ Jenkins deploy
  # ==========================================
  nginx_gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    restart: always
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_upstream_data:/etc/nginx/upstream.d
    depends_on:
      - pgadmin
      - headscale
    networks:
      - sts-backend

volumes:
  postgres_uat_data:
  postgres_master_data:
  pgadmin_data:
  jenkins_data:
  nginx_upstream_data:
