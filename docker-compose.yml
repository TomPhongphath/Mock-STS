version: '3.8'

networks:
  sts-frontend:
    driver: bridge
  sts-backend:
    driver: bridge

services:
  # 0. Container ��������͹�ԡ������鹢ͧ Headscale
  headscale-init:
    image: alpine:latest
    container_name: headscale_init
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/config/config.headscale.yaml:/tmp/config.headscale.yaml:ro
    command: >
      sh -c "
      if [ ! -f /etc/headscale/config.yaml ]; then
        echo 'Copying pre-configured Headscale config...';
        cp /tmp/config.headscale.yaml /etc/headscale/config.yaml;
      else
        echo 'Config file already exists.';
      fi
      "
    networks:
      - sts-backend

  # 1. Headscale Server Container
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: always
    ports:
      - "${HS_PORT:-8080}:8080"
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
    command: serve
    depends_on:
      headscale-init:
        condition: service_completed_successfully
      postgres_uat:
        condition: service_healthy
    networks:
      - sts-frontend
      - sts-backend

  # 2. PostgreSQL UAT (Port ��ҹ�͡ 5431)
  postgres_uat:
    image: postgres:15-alpine
    container_name: postgres_uat
    restart: always
    ports:
      - "${PG_UAT_PORT:-5431}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-STS}
      POSTGRES_USER: ${POSTGRES_USER:-userSTS}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-S@mart@2024}
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-userSTS} -d ${POSTGRES_DB:-STS}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sts-backend

  # 3. PostgreSQL MASTER (Port ��ҹ�͡ 5432)
  postgres_master:
    image: postgres:15-alpine
    container_name: postgres_master
    restart: always
    ports:
      - "${PG_MASTER_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-STS}
      POSTGRES_USER: ${POSTGRES_USER:-userSTS}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-S@mart@2024}
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-userSTS} -d ${POSTGRES_DB:-STS}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sts-backend

  # 4. pgAdmin Container
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_web
    restart: always
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@yourdomain.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-PgAdminSecurePass123!}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpass:ro
    depends_on:
      - postgres_uat
      - postgres_master
    networks:
      - sts-frontend
      - sts-backend

  # 5. Keycloak Container (�� PostgreSQL MASTER �� backend)
  keycloak_auth:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak_auth
    restart: always
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_master:5432/STS
      KC_DB_USERNAME: ${POSTGRES_USER:-userSTS}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-S@mart@2024}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-KeycloakSecurePass123!}
    command: start
    depends_on:
      postgres_master:
        condition: service_healthy
    networks:
      - sts-frontend
      - sts-backend

volumes:
  postgres_uat_data:
  postgres_master_data:
  pgadmin_data:
