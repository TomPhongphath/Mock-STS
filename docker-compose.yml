networks:
  sts-net:
    driver: bridge

services:
  # ==========================================
  # Init Headscale config
  # ==========================================
  headscale-init:
    image: alpine:latest
    container_name: headscale_init
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/config/config.headscale.yaml:/tmp/config.headscale.yaml:ro
    command: >
      sh -c "
      if [ ! -f /etc/headscale/config.yaml ]; then
        echo 'Init Headscale config...';
        cp /tmp/config.headscale.yaml /etc/headscale/config.yaml;
        echo 'Config initialized with SQLite backend.';
      else
        echo 'Config already exists.';
      fi
      "
    networks:
      - sts-net

  # ==========================================
  # Headscale Server — Mesh VPN Control Plane
  # ==========================================
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: always
    ports:
      - "0.0.0.0:${HS_PORT:-8080}:8080"
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
    command: serve
    depends_on:
      headscale-init:
        condition: service_completed_successfully
    networks:
      - sts-net

  # ==========================================
  # Backend Services — MASTER
  # ==========================================
  sts-noc-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-NOC
        CSPROJ_FILE: NOC.csproj
    container_name: sts-noc-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-alert-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-ALERT
        CSPROJ_FILE: STS-ALERT.csproj
    container_name: sts-alert-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-teleport-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: SCS-TELEPORT
        CSPROJ_FILE: Teleport/Teleport.csproj
    container_name: sts-teleport-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-dashboard-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-DASHBOARD
        CSPROJ_FILE: STS-DASHBOARD.csproj
    container_name: sts-dashboard-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
      - AlertOptions__AlertAPI=http://sts-alert-master:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-master-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-MASTER
        CSPROJ_FILE: Master.csproj
    container_name: sts-master-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-adm-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-ADM
        CSPROJ_FILE: ADM.csproj
    container_name: sts-adm-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Key=a-string-secret-at-least-256-bits-long
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
      - PathFile__UploadProfile=/app/UploadFile/UserProfile
    networks:
      - sts-net
    restart: unless-stopped

  sts-install-master:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-INSTALL
        CSPROJ_FILE: Install.csproj
    container_name: sts-install-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-ic-master:
    profiles:
      - ic
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-INVENTORY-CONTROL/IC
        CSPROJ_FILE: IC.csproj
    container_name: sts-ic-master
    environment:
      - ConnectionStrings__ConnString=Host=postgres_master;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-master:80
      - Jwt__Audience=http://sts-adm-master:80
    networks:
      - sts-net
    restart: unless-stopped

  # ==========================================
  # Backend Services — UAT
  # ==========================================
  sts-noc-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-NOC
        CSPROJ_FILE: NOC.csproj
    container_name: sts-noc-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-alert-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-ALERT
        CSPROJ_FILE: STS-ALERT.csproj
    container_name: sts-alert-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-teleport-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: SCS-TELEPORT
        CSPROJ_FILE: Teleport/Teleport.csproj
    container_name: sts-teleport-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-dashboard-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-DASHBOARD
        CSPROJ_FILE: STS-DASHBOARD.csproj
    container_name: sts-dashboard-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
      - AlertOptions__AlertAPI=http://sts-alert-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-master-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-MASTER
        CSPROJ_FILE: Master.csproj
    container_name: sts-master-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-adm-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-ADM
        CSPROJ_FILE: ADM.csproj
    container_name: sts-adm-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Key=another-long-secret-key-for-uat-256-bits
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
      - PathFile__UploadProfile=/app/UploadFile/UserProfile
    networks:
      - sts-net
    restart: unless-stopped

  sts-install-uat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-INSTALL
        CSPROJ_FILE: Install.csproj
    container_name: sts-install-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  sts-ic-uat:
    profiles:
      - ic
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PROJECT_PATH: STS-INVENTORY-CONTROL/IC
        CSPROJ_FILE: IC.csproj
    container_name: sts-ic-uat
    environment:
      - ConnectionStrings__ConnString=Host=postgres_uat;Port=5432;Database=STS;User Id=userSTS;Password=${POSTGRES_PASSWORD:-058c55af16a8410eb1eb5e94f79d073be235}
      - Jwt__Issuer=http://sts-adm-uat:80
      - Jwt__Audience=http://sts-adm-uat:80
    networks:
      - sts-net
    restart: unless-stopped

  # ==========================================
  # Frontend — sts-portal (Next.js)
  # ==========================================
  sts-portal-master:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sts-portal-master
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_BASE_PATH: /app
      NEXT_PUBLIC_BASE_APP_URL: http://localhost:${MASTER_HTTP_PORT:-82}/app
      NEXT_PUBLIC_API_DASHBOARD_SERVICE: /api_dashboard_service
      NEXT_PUBLIC_API_ADM_SERVICE: /api_adm_service
      NEXT_PUBLIC_API_MASTER_SERVICE: /api_master_service
      NEXT_PUBLIC_API_TELEPORT_SERVICE: /api_teleport_service
      NEXT_PUBLIC_API_INSTALL_SERVICE: /api_install_service
      NEXT_PUBLIC_API_NOC_SERVICE: /api_noc_service
      NEXT_PUBLIC_API_IC_SERVICE: /api_ic_service
      NEXT_PUBLIC_API_ALERT_SERVICE: /api_alert_service
    networks:
      - sts-net
    restart: unless-stopped

  sts-portal-uat:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sts-portal-uat
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_BASE_PATH: /uat
      NEXT_PUBLIC_BASE_APP_URL: http://localhost:81/app
      NEXT_PUBLIC_API_DASHBOARD_SERVICE: /api_dashboard_uat_service
      NEXT_PUBLIC_API_ADM_SERVICE: /api_adm_uat_service
      NEXT_PUBLIC_API_MASTER_SERVICE: /api_master_uat_service
      NEXT_PUBLIC_API_TELEPORT_SERVICE: /api_teleport_uat_service
      NEXT_PUBLIC_API_INSTALL_SERVICE: /api_install_uat_service
      NEXT_PUBLIC_API_NOC_SERVICE: /api_noc_uat_service
      NEXT_PUBLIC_API_IC_SERVICE: /api_ic_uat_service
      NEXT_PUBLIC_API_ALERT_SERVICE: /api_alert_uat_service
    networks:
      - sts-net
    restart: unless-stopped

  # ==========================================
  # Reverse Proxy — MASTER
  # ==========================================
  nginx-exporter-master:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: sts-nginx-exporter-master
    command:
      - '-nginx.scrape-uri=http://nginx-master:80/stub_status'
    depends_on:
      - nginx-master
    networks:
      - sts-net
    restart: unless-stopped

  nginx-master:
    image: nginx:alpine
    container_name: nginx-master
    ports:
      - "${MASTER_HTTP_PORT:-82}:80"
    volumes:
      - ./nginx.master.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sts-adm-master
      - sts-noc-master
      - sts-alert-master
      - sts-teleport-master
      - sts-dashboard-master
      - sts-master-master
      - sts-install-master
      - sts-portal-master
    networks:
      - sts-net
    restart: unless-stopped

  # ==========================================
  # Reverse Proxy — UAT
  # ==========================================
  nginx-exporter-uat:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: sts-nginx-exporter-uat
    command:
      - '-nginx.scrape-uri=http://nginx-uat:80/stub_status'
    depends_on:
      - nginx-uat
    networks:
      - sts-net
    restart: unless-stopped

  nginx-uat:
    image: nginx:alpine
    container_name: nginx-uat
    ports:
      - "81:80"
    volumes:
      - ./nginx.uat.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sts-adm-uat
      - sts-noc-uat
      - sts-alert-uat
      - sts-teleport-uat
      - sts-dashboard-uat
      - sts-master-uat
      - sts-install-uat
      - sts-portal-uat
    networks:
      - sts-net
    restart: unless-stopped

  # ==========================================
  # Jenkins — CI/CD Server
  # ==========================================
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: always
    ports:
      - "0.0.0.0:${JENKINS_PORT:-9090}:8080"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_OPTS: "--prefix="
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./jenkins/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d:ro
      - ./jenkins/jobs:/opt/jenkins-job-templates:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:/workspace
    user: root
    networks:
      - sts-net

  # ==========================================
  # Prometheus — Monitoring
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - sts-net
    restart: unless-stopped

volumes:
  jenkins_data:
  prometheus_data:
