# STS Mock — Nginx Gateway Config
# upstream.d/*.conf จะถูก auto-generate โดย Jenkins deploy script
# ไฟล์นี้เป็น static routes สำหรับ services ที่อยู่本项目 compose

# ==========================================
# pgAdmin
# ==========================================
server {
    listen 80;
    server_name pgadmin.sts.local pgadmin;

    location / {
        proxy_pass http://pgadmin_web:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================================
# Headscale
# ==========================================
server {
    listen 80;
    server_name headscale.sts.local headscale;

    location / {
        proxy_pass http://headscale:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
