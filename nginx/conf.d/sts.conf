# STS Mock — Nginx Gateway Config
# API routes proxy to Jenkins-deployed service containers
# Containers ต้อง join network ก่อน: docker network connect mock-sts_sts-backend <container>

# ==========================================
# pgAdmin
# ==========================================
server {
    listen 80;
    server_name pgadmin.sts.local pgadmin;

    location / {
        proxy_pass http://pgadmin_web:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

