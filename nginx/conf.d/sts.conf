# STS Mock Environment - Nginx Route Configuration
# ใช้ self-signed cert ก่อน (จนกว่า Certbot จะสร้าง Let's Encrypt จริง)
# ถ้ามี domain จริง ให้เปลี่ยน SERVER_NAME เป็น domain ของคุณ

# ============================================
# Headscale Route
# ============================================
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # Self-signed cert (สร้างโดย init หรือ user)
    ssl_certificate     /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ==========================================
    # Headscale API (Web UI + Node registration)
    # ==========================================
    location /headscale/ {
        proxy_pass http://headscale:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Headscale gRPC endpoint
    location /headscale.grpc/ {
        grpc_pass grpc://headscale:50443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==========================================
    # Keycloak Route
    # ==========================================
    location /keycloak/ {
        proxy_pass http://keycloak_auth:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 90s;

        # Keycloak requires these for proper redirect
        proxy_redirect http://keycloak_auth:8080/ /keycloak/;
    }

    # ==========================================
    # pgAdmin Route
    # ==========================================
    location /pgadmin/ {
        proxy_pass http://pgadmin_web:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_read_timeout 90s;
    }

    # ==========================================
    # Health check / Root
    # ==========================================
    location / {
        return 200 '{"status":"healthy","service":"STS Mock Gateway"}';
        add_header Content-Type application/json;
    }

    # ==========================================
    # Certbot ACME challenge
    # ==========================================
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
