server {
    listen 80;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location = / {
        return 302 $scheme://$http_host/app;
    }

    location /app/ {
        proxy_pass http://sts-portal-master:3000/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /app {
        proxy_pass http://sts-portal-master:3000/app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /uat/ {
        proxy_pass http://sts-portal-uat:3000/uat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /uat {
        proxy_pass http://sts-portal-uat:3000/uat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api_dashboard_service/ { proxy_pass http://sts-dashboard-master:80/; }
    location /api_adm_service/       { proxy_pass http://sts-adm-master:80/; }
    location /api_master_service/    { proxy_pass http://sts-master-master:80/; }
    location /api_teleport_service/  { proxy_pass http://sts-teleport-master:80/; }
    location /api_install_service/   { proxy_pass http://sts-install-master:80/; }
    location /api_noc_service/       { proxy_pass http://sts-noc-master:80/; }
    location /api_alert_service/     { proxy_pass http://sts-alert-master:80/; }
    location /api_dashboard_uat_service/ { proxy_pass http://sts-dashboard-uat:80/; }
    location /api_adm_uat_service/       { proxy_pass http://sts-adm-uat:80/; }
    location /api_master_uat_service/    { proxy_pass http://sts-master-uat:80/; }
    location /api_teleport_uat_service/  { proxy_pass http://sts-teleport-uat:80/; }
    location /api_install_uat_service/   { proxy_pass http://sts-install-uat:80/; }
    location /api_noc_uat_service/       { proxy_pass http://sts-noc-uat:80/; }
    location /api_alert_uat_service/     { proxy_pass http://sts-alert-uat:80/; }

    location /_next/static/ {
        proxy_pass http://sts-portal-master:3000/app/_next/static/;
        proxy_set_header Host $host;
    }
}
