        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api_noc_service/ {
        proxy_pass http://bff-web-master:80/api_noc_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api_alert_service/ {
        proxy_pass http://bff-web-master:80/api_alert_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api_dashboard_uat_service/ {
