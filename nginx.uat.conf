server {
    listen 80;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location = / {
        return 302 $scheme://$http_host/app;
    }

    location / {
        proxy_pass http://sts-portal-uat:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api_dashboard_service/ { proxy_pass http://bff-web-uat:80/api_dashboard_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api_adm_service/       { proxy_pass http://bff-web-uat:80/api_adm_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api_master_service/    { proxy_pass http://bff-web-uat:80/api_master_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api_teleport_service/  { proxy_pass http://bff-web-uat:80/api_teleport_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api_install_service/   { proxy_pass http://bff-web-uat:80/api_install_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api_noc_service/       { proxy_pass http://bff-web-uat:80/api_noc_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api_alert_service/     { proxy_pass http://bff-web-uat:80/api_alert_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
